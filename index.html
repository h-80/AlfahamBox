<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tik Tak - تيك تاك</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --main: #fe2c55; --sub: #25f4ee; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        
        /* شاشة تسجيل الدخول */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .g-btn { background: white; color: black; padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; }

        /* التصميم العلوي */
        .top-nav { position: absolute; top: 25px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; font-weight: bold; text-shadow: 2px 2px 5px #000; }
        .tab.active { border-bottom: 2px solid white; }

        /* مشغل الفيديوهات */
        .swiper { width: 100%; height: 100vh; }
        .video-container { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* أزرار التفاعل الجانبية */
        .side-bar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 50; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid white; }
        .icon-box { text-align: center; font-size: 25px; cursor: pointer; }
        .icon-box span { font-size: 12px; display: block; }

        /* القائمة السفلية */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 100; }
        .plus-btn { background: linear-gradient(to right, var(--sub), var(--main)); padding: 4px 18px; border-radius: 10px; color: black; font-weight: bold; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 50px; margin-bottom: 20px; letter-spacing: -2px;">Tik Tak</h1>
        <button class="g-btn" id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            تسجيل الدخول بالجيميل
        </button>
    </div>

    <div class="top-nav">
        <div class="tab">اتابعه</div>
        <div class="tab active">لك</div>
        <div class="tab">استكشف</div>
    </div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="video-feed">
            </div>
    </div>

    <div class="bottom-nav">
        <div style="color: white;">🏠</div>
        <div>👥</div>
        <div onclick="document.getElementById('file-up').click()"><span class="plus-btn">+</span></div>
        <div>💬</div>
        <div onclick="alert('ملفك الشخصي')">👤</div>
    </div>

    <input type="file" id="file-up" hidden accept="video/*">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // إعدادات مشروعك الجديد (Tik Tak Asia)
        const firebaseConfig = {
            apiKey: "AIzaSyANGnbMj4S6xS5Xkl7dSIqTXwqYloy55Mw",
            authDomain: "tik-tak-cdfad.firebaseapp.com",
            databaseURL: "https://tik-tak-cdfad-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "tik-tak-cdfad",
            storageBucket: "tik-tak-cdfad.firebasestorage.app",
            appId: "1:345131210299:web:6acd8e3198b0238f84ee1e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // وظيفة تسجيل الدخول
        document.getElementById('loginBtn').onclick = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).then(() => {
                document.getElementById('login-screen').style.display = 'none';
            }).catch(err => {
                alert("تأكد من إضافة رابط موقعك في صفحة Authorized Domains داخل Firebase");
            });
        };

        // التحقق من حالة المستخدم
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
            }
        });

        // جلب وعرض الفيديوهات
        onValue(ref(db, 'videos'), (snapshot) => {
            const feed = document.getElementById('video-feed');
            feed.innerHTML = '';
            snapshot.forEach((child) => {
                const data = child.val();
                feed.insertAdjacentHTML('afterbegin', `
                    <div class="swiper-slide">
                        <div class="video-container">
                            <video src="${data.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                            <div class="side-bar">
                                <img src="${data.userPhoto || 'https://via.placeholder.com/50'}" class="user-avatar">
                                <div class="icon-box">❤️<span>0</span></div>
                                <div class="icon-box">💬<span>0</span></div>
                                <div class="icon-box">🔗<span>شارك</span></div>
                            </div>
                            <div style="position:absolute; bottom:80px; left:15px; text-shadow:1px 1px 5px #000;">
                                <b>@${data.userName}</b>
                                <p style="font-size:14px; margin-top:5px;">مرحباً بكم في تيك تاك 🎬</p>
                            </div>
                        </div>
                    </div>`);
            });
            // تشغيل مكتبة السحب
            new Swiper(".mySwiper", { direction: "vertical" });
        });

        // رفع الفيديو
        document.getElementById('file-up').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            alert("بدأ رفع الفيديو، يرجى الانتظار...");
            const storageRef = sRef(storage, 'uploads/' + Date.now() + '_' + file.name);
            
            try {
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                
                const newVideoRef = push(ref(db, 'videos'));
                await set(newVideoRef, {
                    url: url,
                    userName: auth.currentUser.displayName,
                    userPhoto: auth.currentUser.photoURL,
                    userId: auth.currentUser.uid,
                    timestamp: Date.now()
                });
                alert("تم النشر بنجاح!");
            } catch (error) {
                alert("فشل الرفع: تأكد من تفعيل Storage Rules في Firebase");
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</body>
</html>
