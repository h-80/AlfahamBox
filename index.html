<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الفاهم للصيانة - طلب ذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #FFC107;
            --dark: #121212;
            --gray: #f8f9fa;
            --success: #28a745;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background-color: #ebedef; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .app-card {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .hero {
            background: var(--dark);
            color: var(--primary);
            padding: 25px;
            text-align: center;
        }

        .hero i { font-size: 35px; margin-bottom: 10px; }
        .hero h1 { font-size: 20px; color: #fff; }

        .content { padding: 20px; }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            background: var(--gray);
            font-size: 14px;
            outline: none;
        }

        /* زر الموقع السلس */
        .location-btn {
            background: #fff9e6;
            border: 2px dashed var(--primary);
            color: var(--dark);
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .location-btn.confirmed {
            background: #f4fff6;
            border: 2px solid var(--success);
            color: var(--success);
        }

        .btn-submit {
            background: var(--dark);
            color: var(--primary);
            border: none;
            padding: 18px;
            border-radius: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center; align-items: center; gap: 10px;
        }

        .footer-text { text-align: center; font-size: 10px; color: #bbb; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="hero">
        <i class="fas fa-tools"></i>
        <h1>مركز الصيانة الاحترافي</h1>
    </div>

    <div class="content">
        <form id="autoOrderForm">
            <div class="section-title">بيانات الزبون</div>
            <div class="form-group">
                <input type="text" id="cust_name" placeholder="الاسم الكامل" required>
            </div>
            <div class="form-group">
                <input type="tel" id="cust_phone" placeholder="رقم الهاتف" required>
            </div>

            <div class="section-title">تفاصيل الجهاز</div>
            <div class="form-group">
                <select id="cust_device">
                    <option value="آيفون">iPhone</option>
                    <option value="سامسونج">Samsung</option>
                    <option value="شاومي">Xiaomi</option>
                    <option value="بلاي ستيشن">PlayStation</option>
                    <option value="أخرى">أخرى</option>
                </select>
            </div>
            <div class="form-group">
                <textarea id="cust_issue" rows="2" placeholder="وصف العطل..." required></textarea>
            </div>

            <div class="section-title">موقع الاستلام</div>
            <div class="location-btn" id="locTrigger" onclick="autoCaptureLocation()">
                <i class="fas fa-map-marker-alt" id="locIcon"></i>
                <span id="locStatus">اضغط هنا لتأكيد موقعك الحالي</span>
            </div>
            
            <div class="form-group">
                <input type="text" id="cust_addr_manual" placeholder="العنوان يدوياً (اختياري)">
            </div>

            <input type="hidden" id="hidden_map_link">

            <button type="submit" class="btn-submit">
                إرسال الطلب عبر واتساب <i class="fab fa-whatsapp"></i>
            </button>
        </form>
        <p class="footer-text">خدمة الصيانة المنزلية - استلام وتوصيل</p>
    </div>
</div>

<script>
    // وظيفة جلب الموقع التلقائي بضغطة واحدة
    function autoCaptureLocation() {
        const status = document.getElementById('locStatus');
        const icon = document.getElementById('locIcon');
        const trigger = document.getElementById('locTrigger');
        const hiddenLink = document.getElementById('hidden_map_link');

        status.innerText = "جاري تحديد إحداثياتك...";
        icon.className = "fas fa-spinner fa-spin";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                // إنشاء الرابط تلقائياً
                const mapURL = `https://www.google.com/maps?q=${lat},${lon}`;
                hiddenLink.value = mapURL;

                // تحديث شكل الزر للنجاح
                status.innerText = "تم تأكيد موقعك بنجاح ✓";
                icon.className = "fas fa-check-circle";
                trigger.classList.add('confirmed');
            }, function(error) {
                // في حال فشل الجلب (الصلاحيات)
                alert("يرجى تفعيل الـ GPS والسماح للتطبيق بالوصول للموقع");
                status.innerText = "فشل التحديد - تأكد من الـ GPS";
                icon.className = "fas fa-exclamation-triangle";
            }, { enableHighAccuracy: true, timeout: 5000 });
        } else {
            alert("المتصفح لا يدعم تحديد الموقع");
        }
    }

    document.getElementById('autoOrderForm').onsubmit = function(e) {
        e.preventDefault();
        
        const now = new Date();
        const dateStr = now.toLocaleDateString('ar-EG'); 
        const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

        const name = document.getElementById('cust_name').value;
        const phone = document.getElementById('cust_phone').value;
        const device = document.getElementById('cust_device').value;
        const issue = document.getElementById('cust_issue').value;
        const addrManual = document.getElementById('cust_addr_manual').value;
        const finalMap = document.getElementById('hidden_map_link').value;

        const whatsappNum = "9647722353355"; 

        // بناء الرسالة النهائية
        let msg = `*طلب صيانة جديد* 🛠️%0A`;
        msg += `*التاريخ:* ${dateStr}%0A`;
        msg += `*الساعة:* ${timeStr}%0A`;
        msg += `--------------------------%0A`;
        msg += `👤 *الزبون:* ${name}%0A`;
        msg += `📞 *الهاتف:* ${phone}%0A`;
        msg += `📱 *الجهاز:* ${device}%0A`;
        msg += `⚠️ *العطل:* ${issue}%0A`;
        msg += `📍 *العنوان:* ${addrManual || "مرفق في الرابط"}%0A`;
        
        if(finalMap) {
            msg += `%0A🗺️ *رابط الموقع المباشر:*%0A${finalMap}`;
        }

        window.location.href = `https://api.whatsapp.com/send?phone=${whatsappNum}&text=${msg}`;
    };
</script>

</body>
</html>
