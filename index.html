<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب الفاهم - النسخة الجديدة</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --green: #075e54; --white: #ffffff; --light-green: #dcf8c6; }
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; }
        input { width: 80%; padding: 12px; margin: 10px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-size: 16px; }
        button { width: 85%; padding: 12px; background: #25d366; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #chat-screen { display: none; height: 100vh; flex-direction: column; }
        .header { background: var(--green); color: white; padding: 15px; font-size: 18px; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 15px; position: relative; }
        .sent { align-self: flex-end; background: var(--light-green); }
        .received { align-self: flex-start; background: var(--white); }
        .input-bar { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
        #m-input { flex: 1; border-radius: 20px; border: none; padding: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="font-size: 28px; color: #25d366; font-weight: bold; margin-bottom: 20px;">الفاهم واتساب</div>
        <div id="phone-box">
            <input type="text" id="phone" placeholder="+964 000 000 0000">
            <button id="send-code">إرسال الرمز 💬</button>
        </div>
        <div id="code-box" style="display:none;">
            <input type="text" id="code" placeholder="أدخل الرمز المستلم">
            <button id="verify-code">تأكيد ودخول ✅</button>
        </div>
        <div id="recaptcha-container"></div>
    </div>

    <div id="chat-screen">
        <div class="header">الفاهم واتساب - متصل الآن</div>
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="m-input" placeholder="اكتب رسالتك...">
            <button id="send-msg" style="width: 50px; border-radius: 50%; background: #075e54;">➤</button>
        </div>
    </div>

    <script>
        // إعداداتك الجديدة التي أرسلتها (تم التحديث)
        const firebaseConfig = {
            apiKey: "AIzaSyCRnIF0BEIvf5axNd7S2CjGn1oBI5Ew4KI",
            authDomain: "tik-tak-cdfad.firebaseapp.com",
            projectId: "tik-tak-cdfad",
            storageBucket: "tik-tak-cdfad.firebasestorage.app",
            messagingSenderId: "365921755333",
            appId: "1:365921755333:web:83c879efb2c05b56bd90ac",
            databaseURL: "https://tik-tak-cdfad-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        // بدء العمل
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let confirmationResult;

        // إرسال الكود
        document.getElementById('send-code').onclick = function() {
            const phone = document.getElementById('phone').value;
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
            
            auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
                .then(result => {
                    confirmationResult = result;
                    document.getElementById('phone-box').style.display = 'none';
                    document.getElementById('code-box').style.display = 'block';
                    alert("وصلك الرمز الآن!");
                }).catch(err => alert("خطأ: " + err.message));
        };

        // التحقق
        document.getElementById('verify-code').onclick = function() {
            const code = document.getElementById('code').value;
            confirmationResult.confirm(code).then(result => {
                enterChat(result.user.phoneNumber);
            }).catch(err => alert("رمز غير صحيح"));
        };

        function enterChat(phone) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            // جلب الرسائل
            db.ref('whatsapp_messages').limitToLast(50).on('value', snap => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    const isMe = d.p === phone;
                    box.innerHTML += `<div class="msg ${isMe ? 'sent' : 'received'}">
                        <small style="color:#075e54; font-size:10px;">${d.p}</small><br>${d.m}
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // إرسال رسالة
        document.getElementById('send-msg').onclick = function() {
            const input = document.getElementById('m-input');
            if(input.value) {
                db.ref('whatsapp_messages').push({
                    p: auth.currentUser.phoneNumber,
                    m: input.value,
                    t: Date.now()
                });
                input.value = "";
            }
        };
    </script>
</body>
</html>
