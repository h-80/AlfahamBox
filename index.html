<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مشغل القنوات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:black;font-family:'Cairo',sans-serif;color:white;height:100vh;display:flex;overflow:hidden;}
        .player-container{width: 85%;height: 100vh;background:black;position:relative;flex-shrink:0;order: 2;}
        video{width:100%;height:100%;background:black;outline:none;}
        .channels-container{background:#1a1a1a;width: 15%;height: 100vh;padding:6px;overflow-y:auto;order: 1;}
        .channels-grid{display:flex;flex-direction:column;gap:3px;}
        .channel-card{background:#2a2a2a;border-radius:4px;padding:4px 8px;cursor:pointer;border:1px solid #3a3a3a;color:white;font-size:13px;text-align:right;display:flex;align-items:center;gap:6px;line-height:1.3;min-height:32px;}
        .channel-number{display:inline-flex;align-items:center;justify-content:center;background:#444;color:#fff;font-size:11px;font-weight:600;width:20px;height:20px;border-radius:3px;flex-shrink:0;}
        .channel-card:hover{background:#3a3a3a;}
        .channel-card.active{border-right:3px solid white;background:#3a3a3a;}
        .channel-card.active .channel-number{background:#e74c3c;color:white;}
        .channel-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        @media (max-width: 768px) {
            body {flex-direction: column;}
            .player-container {width: 100%;height: 65vh;order: 2;}
            .channels-container {width: 100%;height: 35vh;order: 1;}
        }
    </style>
</head>
<body>

        const video = document.getElementById('video');
        const list = document.getElementById('channelsList');
        let hls = null;

        function playChannel(url) {
            if (hls) { hls.destroy(); }
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }

        const lines = channelsData.split('\n');
        lines.forEach((line, index) => {
            const [name, url] = line.split('|');
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `<span class="channel-number">${index + 1}</span><span class="channel-name">${name}</span>`;
            card.onclick = () => {
                document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                playChannel(url);
            };
            list.appendChild(card);
        });
    </script>
</body>
</html>
